name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: cd panel && npm ci

      - run: npm test

  e2e-tutorial:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project: [demo, test-app, test-app-angular]
        include:
          - project: demo
            install: |
              cd demo && npm ci
              cd $GITHUB_WORKSPACE/storybook-test/v10 && npm install
              cd $GITHUB_WORKSPACE/test-app && npm ci --legacy-peer-deps
          - project: test-app
            install: |
              cd test-app && npm ci --legacy-peer-deps
              cd $GITHUB_WORKSPACE/storybook-test/v10 && npm install
          - project: test-app-angular
            install: |
              cd test-app-angular && npm ci
              cd $GITHUB_WORKSPACE/storybook-test/angular-v10 && npm install
              cd $GITHUB_WORKSPACE/test-app-angular && npm run build:css

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install panel deps
        run: cd panel && npm ci

      - name: Install project deps
        run: ${{ matrix.install }}

      - name: Build overlay + panel
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tutorial E2E tests (${{ matrix.project }})
        run: PW_PROJECT=${{ matrix.project }} npx playwright test --config e2e/playwright.config.ts --project ${{ matrix.project }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-tutorial-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7

  e2e-flow:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install panel deps
        run: cd panel && npm ci

      - name: Install test-app deps
        run: cd test-app && npm ci --legacy-peer-deps

      - name: Install storybook-test/v10 deps
        run: cd storybook-test/v10 && npm install

      - name: Build overlay + panel
        run: npm run build

      - name: Install Playwright browsers
        run: cd test-app && npx playwright install --with-deps chromium

      - name: Run flow E2E tests
        run: cd test-app && npx playwright test --reporter=line

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-flow-results
          path: test-app/playwright-report/
          retention-days: 7
