<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test: Web Component Bottom Toolbar</title>
  <link rel="stylesheet" href="tokens/overlay-tokens.css">
  <link rel="stylesheet" href="tokens/overlay-components.css">
  <script src="mockup-components.js"></script>
  <style>
    body { margin: 0; background: #f5f5f5; height: 100vh; position: relative; font-family: 'Inter', system-ui, sans-serif; }
    .demo-section { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .demo-label { font-size: 11px; color: #666; margin-bottom: 4px; }
    .demo-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="demo-section">
    <div>
      <div class="demo-label">Bottom Toolbar</div>
      <vb-bottom-toolbar selected-tool="select" instance-count="3"></vb-bottom-toolbar>
    </div>

    <div>
      <div class="demo-label">Message Input (with send)</div>
      <vb-message-input id="msg1"></vb-message-input>
    </div>

    <div>
      <div class="demo-label">Message Input (no send button — canvas mode)</div>
      <vb-message-input show-send="false" placeholder="add context about this element…"></vb-message-input>
    </div>
  </div>

  <script>
    document.getElementById('msg1').addEventListener('message-send', (e) => {
      console.log('message-send:', e.detail);
      alert('Sent: ' + e.detail.text);
    });
  </script>
</body>
</html>
